<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>👁️ 守护神情报局</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080c14; --surface: #0d1321; --card: #111827;
      --border: #1e2d40; --border2: #2a3f5c;
      --text: #e2e8f0; --muted: #64748b; --dim: #334155;
      --accent: #f97316; --accent2: #38bdf8; --green: #34d399;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Noto Sans SC','Inter',-apple-system,sans-serif; line-height: 1.6; min-height: 100vh; }

    /* ── Header ── */
    header {
      background: linear-gradient(180deg,#0a1628 0%,var(--bg) 100%);
      border-bottom: 1px solid var(--border);
      padding: 36px 24px 28px;
      position: sticky; top: 0; z-index: 100;
      backdrop-filter: blur(12px);
    }
    .header-inner { max-width: 900px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand-icon { font-size: 28px; }
    .brand h1 { font-size: 18px; font-weight: 700; color: var(--text); }
    .brand p { font-size: 11px; color: var(--muted); }

    .meta-pill { display: flex; align-items: center; gap: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 100px; padding: 6px 18px; }
    .meta-item { text-align: center; }
    .meta-item .val { font-size: 18px; font-weight: 800; color: var(--accent); line-height: 1; }
    .meta-item .lbl { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
    .meta-div { width: 1px; height: 24px; background: var(--border); }

    /* ── Nav tabs ── */
    .nav-tabs { max-width: 900px; margin: 0 auto; padding: 0 24px; display: flex; gap: 4px; margin-top: 20px; }
    .tab-btn { background: none; border: 1px solid transparent; color: var(--muted); font-size: 13px; font-weight: 500; padding: 6px 16px; border-radius: 8px; cursor: pointer; transition: all 0.2s; font-family: inherit; }
    .tab-btn:hover { color: var(--text); border-color: var(--border); }
    .tab-btn.active { background: var(--surface); border-color: var(--border2); color: var(--text); }

    /* ── Main ── */
    main { max-width: 900px; margin: 0 auto; padding: 28px 24px 80px; }

    /* ── Section header ── */
    .sec-head { display: flex; align-items: center; gap: 8px; margin: 30px 0 14px; }
    .sec-head .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .sec-head h2 { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; }
    .sec-head .line { flex: 1; height: 1px; background: var(--border); }

    /* ── Cards ── */
    .card {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 16px 20px; margin-bottom: 9px; transition: border-color 0.2s, transform 0.15s;
      position: relative; overflow: hidden;
    }
    .card:hover { border-color: var(--border2); transform: translateX(2px); }
    .card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent); border-radius: 3px 0 0 3px; opacity: 0; transition: opacity 0.2s; }
    .card:hover::before { opacity: 1; }

    .card-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 7px; flex-wrap: wrap; }
    .src-row { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
    .src-tag { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; color: var(--accent2); background: rgba(56,189,248,0.07); border: 1px solid rgba(56,189,248,0.18); padding: 2px 7px; border-radius: 4px; text-decoration: none; transition: background 0.2s; }
    .src-tag:hover { background: rgba(56,189,248,0.14); }
    .time-chip { font-size: 11px; color: var(--dim); }
    .section-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 600; letter-spacing: 0.5px; }
    .badge-high { background: rgba(249,115,22,0.12); color: var(--accent); }
    .badge-deep { background: rgba(56,189,248,0.1); color: var(--accent2); }
    .badge-tool { background: rgba(52,211,153,0.1); color: var(--green); }

    .card-title { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.45; margin-bottom: 5px; }
    .card-summary { font-size: 12.5px; color: var(--muted); line-height: 1.6; margin-bottom: 9px; }
    .card-footer { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .card-link { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; color: var(--accent); text-decoration: none; opacity: 0.75; transition: opacity 0.2s; }
    .card-link:hover { opacity: 1; }

    .score-tag { display: inline-flex; align-items: center; font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 4px; }
    .score-high { background: rgba(249,115,22,0.15); color: var(--accent); }
    .score-mid  { background: rgba(56,189,248,0.1);  color: var(--accent2); }
    .score-low  { background: rgba(52,211,153,0.1);  color: var(--green); }

    /* ── Archive ── */
    .archive-intro { font-size: 13px; color: var(--muted); margin-bottom: 14px; }
    .archive-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
    .arch-card { display: block; background: var(--card); border: 1px solid var(--border); border-radius: 11px; padding: 14px 16px; text-decoration: none; color: inherit; transition: all 0.2s; cursor: pointer; }
    .arch-card:hover { border-color: var(--border2); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
    .arch-date { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .arch-meta { display: flex; gap: 10px; font-size: 11px; color: var(--muted); }
    .arch-meta span { display: flex; align-items: center; gap: 3px; }
    .arch-temp { font-size: 12px; font-weight: 700; color: var(--accent); margin-top: 6px; }

    /* ── Loading / Error ── */
    .state-msg { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; }

    /* ── Footer ── */
    footer { border-top: 1px solid var(--border); padding: 24px; text-align: center; color: var(--dim); font-size: 12px; }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--text); }

    @media (max-width: 600px) {
      .header-inner { flex-direction: column; align-items: flex-start; }
      .meta-pill { width: 100%; justify-content: space-around; }
      .archive-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="brand">
      <span class="brand-icon">👁️</span>
      <div>
        <h1>守护神情报局</h1>
        <p>AI科技情报 · 自动采集</p>
      </div>
    </div>
    <div class="meta-pill">
      <div class="meta-item"><div class="val" id="mTemp">--</div><div class="lbl">温度℃</div></div>
      <div class="meta-div"></div>
      <div class="meta-item"><div class="val" id="mSignals">--</div><div class="lbl">信号</div></div>
      <div class="meta-div"></div>
      <div class="meta-item"><div class="val" id="mSources">--</div><div class="lbl">来源</div></div>
      <div class="meta-div"></div>
      <div class="meta-item"><div class="val" id="mTime" style="font-size:14px">--</div><div class="lbl">更新</div></div>
    </div>
  </div>
  <div class="nav-tabs">
    <button class="tab-btn active" onclick="showTab('today')" id="tabToday">📋 今日简报</button>
    <button class="tab-btn" onclick="showTab('archive')" id="tabArchive">📁 历史归档</button>
  </div>
</header>

<main>
  <div id="tabContent"></div>
</main>

<footer>
  <p>👁️ 守护神情报局 · <a href="https://github.com/wcc0077/guardian-intelligence" target="_blank">GitHub</a></p>
</footer>

<script>
// ── State ──────────────────────────────────────────────────────────────
let currentTab = 'today';

// ── Tabs ────────────────────────────────────────────────────────────────
async function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(tab === 'today' ? 'tabToday' : 'tabArchive').classList.add('active');

  if (tab === 'today') {
    document.getElementById('tabContent').innerHTML = '<div class="state-msg">加载中...</div>';
    try {
      const data = await loadLatest();
      updateHeaderMeta(data);
      document.getElementById('tabContent').innerHTML = buildTodayHTML(data);
    } catch (e) {
      document.getElementById('tabContent').innerHTML = '<div class="state-msg">数据加载失败，请刷新</div>';
    }
  } else {
    loadArchive();
  }
}

function updateHeaderMeta(data) {
  if (!data) return;
  document.getElementById('mTemp').textContent    = data.temperature || '--';
  document.getElementById('mSignals').textContent = data.signalCount || '--';
  document.getElementById('mSources').textContent = data.sourceCount || '--';
  document.getElementById('mTime').textContent     = (data.updateTimeStr || '').slice(-5) || '--';
}

// ── Load ────────────────────────────────────────────────────────────────
async function loadLatest() {
  const resp = await fetch('data/latest.json?t=' + Date.now());
  return resp.json();
}

async function loadArchives() {
  const resp = await fetch('data/archives.json?t=' + Date.now());
  return resp.json();
}

async function loadDay(dateStr) {
  const resp = await fetch('data/' + dateStr + '.json?t=' + Date.now());
  return resp.json();
}

// ── Render today's briefing ──────────────────────────────────────────────
function buildTodayHTML(data) {
  if (!data) return '<div class="state-msg">无数据</div>';

  const sections = { highlights: [], deepDive: [], tools: [] };
  (data.signals || []).forEach(s => {
    const sec = s.section || 'highlights';
    if (!sections[sec]) sections[sec] = [];
    sections[sec].push(s);
  });

  const secMeta = {
    highlights: { label: '【今日要点】', dot: '#f97316', badge: 'badge-high', tag: '要点' },
    deepDive:   { label: '【值得深挖】', dot: '#38bdf8', badge: 'badge-deep',  tag: '深挖' },
    tools:      { label: '【工具/开源】', dot: '#34d399', badge: 'badge-tool', tag: '工具' },
  };

  let html = `<div style="margin-bottom:8px;display:flex;align-items:center;gap:10px">
    <span style="font-size:13px;color:var(--muted)">${esc(data.updateTimeStr || data.date)}</span>
    <span style="font-size:12px;color:var(--accent);font-weight:700">🔥 ${data.temperature}℃</span>
  </div>`;

  Object.entries(secMeta).forEach(([sec, meta]) => {
    const items = sections[sec];
    if (!items || !items.length) return;
    html += `
      <div class="sec-head"><span class="dot" style="background:${meta.dot}"></span><h2>${meta.label}</h2><span class="line"></span></div>`;
    items.forEach(s => { html += buildCard(s, meta.badge, meta.tag); });
  });

  return html;
}

function buildCard(s, badgeCls, tagLabel) {
  const icon = srcIcon(s.source);
  return `
  <div class="card">
    <div class="card-top">
      <div class="src-row">
        <a href="${esc(s.sourceUrl || '#')}" target="_blank" class="src-tag" onclick="event.stopPropagation()">${icon} ${esc(s.source)}</a>
        ${s.pubTime ? `<span class="time-chip">${s.pubTime}</span>` : ''}
      </div>
      <div class="src-row" style="gap:6px">
        <span class="section-badge ${badgeCls}">${tagLabel}</span>
        ${s.score ? scoreTag(s.score) : ''}
      </div>
    </div>
    <div class="card-title">${esc(s.title)}</div>
    ${s.summary ? `<div class="card-summary">${esc(s.summary)}</div>` : ''}
    <div class="card-footer">
      ${s.url ? `<a href="${esc(s.url)}" target="_blank" class="card-link" onclick="event.stopPropagation()">🔗 查看原文 →</a>` : '<span></span>'}
    </div>
  </div>`;
}

// ── Render archive ──────────────────────────────────────────────────────
async function loadArchive() {
  document.getElementById('tabContent').innerHTML = '<div class="state-msg">加载历史归档...</div>';
  try {
    const archives = await loadArchives();
    if (!archives || !archives.length) {
      document.getElementById('tabContent').innerHTML = '<div class="state-msg">暂无历史数据</div>';
      return;
    }
    let html = `<p class="archive-intro">共 ${archives.length} 天的历史记录，点击查看详情</p>
    <div class="archive-grid">`;
    archives.forEach(a => {
      const tempColor = a.temperature >= 75 ? 'var(--accent)' : a.temperature >= 60 ? 'var(--accent2)' : 'var(--muted)';
      html += `
      <div class="arch-card" onclick="loadDayBriefing('${a.date}')">
        <div class="arch-date">${a.date}</div>
        <div class="arch-meta">
          <span>📡 ${a.signalCount}条</span>
          <span>🔥 ${a.temperature}℃</span>
        </div>
        <div class="arch-temp" style="color:${tempColor}">🔥 ${a.temperature}℃</div>
      </div>`;
    });
    html += '</div>';
    document.getElementById('tabContent').innerHTML = html;
  } catch (e) {
    document.getElementById('tabContent').innerHTML = '<div class="state-msg">加载失败，请刷新重试</div>';
  }
}

// ── Load specific day ───────────────────────────────────────────────────
async function loadDayBriefing(dateStr) {
  document.getElementById('tabContent').innerHTML = '<div class="state-msg">加载中...</div>';
  try {
    const data = await loadDay(dateStr);
    updateHeaderMeta(data);

    const dayHTML = `<div style="margin-bottom:20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <button onclick="showTab('archive')" style="background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-family:inherit">
        ← 历史归档
      </button>
      <span style="font-size:13px;color:var(--muted)">${dateStr} · 🔥 ${data.temperature}℃ · ${data.signalCount}条信号</span>
    </div>` + buildTodayHTML(data);

    document.getElementById('tabContent').innerHTML = dayHTML;
  } catch (e) {
    document.getElementById('tabContent').innerHTML = '<div class="state-msg">该日数据不存在</div>';
  }
}

// ── Helpers ─────────────────────────────────────────────────────────────
function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function scoreTag(score) {
  const cls = score >= 75 ? 'score-high' : score >= 60 ? 'score-mid' : 'score-low';
  return `<span class="score-tag ${cls}">AI ${score}</span>`;
}

function srcIcon(src) {
  const icons = { '36氪':'📡', 'HackerNews':'👾', 'GitHub':'🐙', 'MIT Tech Review':'🔬', 'Solidot':'🔏', 'ScienceDaily':'🌍' };
  return icons[src] || '📰';
}

// ── Init ────────────────────────────────────────────────────────────────
(async () => {
  await showTab('today');
})();
</script>

</body>
</html>
