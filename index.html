<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>👁️ 守护神情报局</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #080c14;
      --surface:   #0d1321;
      --card:      #111827;
      --border:    #1e2d40;
      --border2:   #2a3f5c;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --dim:       #334155;
      --accent:    #f97316;
      --accent2:   #38bdf8;
      --green:     #34d399;
      --red:       #f87171;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans SC', 'Inter', -apple-system, sans-serif;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(180deg, #0a1628 0%, var(--bg) 100%);
      border-bottom: 1px solid var(--border);
      padding: 40px 24px 32px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }

    .header-inner {
      max-width: 860px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
    }

    .brand { display: flex; align-items: center; gap: 12px; }
    .brand-icon { font-size: 32px; }
    .brand-text h1 {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
    }
    .brand-text p {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    .meta-pill {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 8px 20px;
    }
    .meta-item { text-align: center; }
    .meta-item .val {
      font-size: 20px;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
    }
    .meta-item .lbl {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 2px;
    }
    .meta-divider {
      width: 1px;
      height: 28px;
      background: var(--border);
    }

    /* ── Main ── */
    main { max-width: 860px; margin: 0 auto; padding: 36px 24px 80px; }

    /* ── Section header ── */
    .section-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .section-head .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }
    .section-head h2 {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }
    .section-head .line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Cards ── */
    .signal-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 22px;
      margin-bottom: 10px;
      transition: border-color 0.2s, transform 0.2s;
      position: relative;
      overflow: hidden;
    }
    .signal-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--accent);
      border-radius: 3px 0 0 3px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .signal-card:hover {
      border-color: var(--border2);
      transform: translateX(2px);
    }
    .signal-card:hover::before { opacity: 1; }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .card-source-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .source-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 600;
      color: var(--accent2);
      background: rgba(56,189,248,0.08);
      border: 1px solid rgba(56,189,248,0.2);
      padding: 2px 8px;
      border-radius: 4px;
      letter-spacing: 0.5px;
      text-decoration: none;
      transition: background 0.2s;
    }
    .source-tag:hover { background: rgba(56,189,248,0.15); }

    .time-badge {
      font-size: 11px;
      color: var(--dim);
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.45;
      margin-bottom: 6px;
    }

    .card-summary {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 10px;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .card-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--accent);
      text-decoration: none;
      opacity: 0.8;
      transition: opacity 0.2s;
    }
    .card-link:hover { opacity: 1; }

    .section-tag {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 4px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .tag-highlight { background: rgba(249,115,22,0.12); color: var(--accent); }
    .tag-deep      { background: rgba(56,189,248,0.1); color: var(--accent2); }
    .tag-tool      { background: rgba(52,211,153,0.1); color: var(--green); }

    /* ── Divider ── */
    .sep {
      border: none;
      border-top: 1px solid var(--border);
      margin: 36px 0;
    }

    /* ── Sources ── */
    .sources-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
      margin-top: 16px;
    }
    .source-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s;
    }
    .source-chip:hover { border-color: var(--border2); }
    .source-chip .icon { font-size: 18px; }
    .source-chip .name { font-size: 13px; font-weight: 500; }
    .source-chip .type { font-size: 11px; color: var(--muted); }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 28px 24px;
      text-align: center;
      color: var(--dim);
      font-size: 12px;
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--text); }

    /* ── Loading ── */
    .loading {
      text-align: center;
      padding: 60px;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 600px) {
      .header-inner { flex-direction: column; align-items: flex-start; }
      .meta-pill { width: 100%; justify-content: space-around; }
      .card-top { flex-direction: column; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="brand">
      <span class="brand-icon">👁️</span>
      <div class="brand-text">
        <h1>守护神情报局</h1>
        <p>AI科技情报 · 自动采集 · 实时更新</p>
      </div>
    </div>
    <div class="meta-pill">
      <div class="meta-item">
        <div class="val" id="temp">--</div>
        <div class="lbl">温度℃</div>
      </div>
      <div class="meta-divider"></div>
      <div class="meta-item">
        <div class="val" id="signals">--</div>
        <div class="lbl">信号数</div>
      </div>
      <div class="meta-divider"></div>
      <div class="meta-item">
        <div class="val" id="sources">--</div>
        <div class="lbl">来源</div>
      </div>
      <div class="meta-divider"></div>
      <div class="meta-item">
        <div class="val" id="updateTime" style="font-size:14px">--</div>
        <div class="lbl">更新时间</div>
      </div>
    </div>
  </div>
</header>

<main id="content">
  <div class="loading">加载中...</div>
</main>

<footer>
  <p>👁️ 守护神情报局 · <a href="https://github.com/wcc0077/guardian-intelligence" target="_blank">GitHub</a> · 数据来源见各条目链接</p>
</footer>

<script>
const SOURCE_ICONS = {
  '36氪': '📡', 'HackerNews': '👾', 'GitHub': '🐙',
  'MIT Tech Review': '🔬', 'Solidot': '🔏', 'ScienceDaily': '🌍', 'default': '📰'
};

const SECTION_META = {
  highlights: { tag: '要点', cls: 'tag-highlight', label: '【今日要点】' },
  deepDive:   { tag: '深挖', cls: 'tag-deep',      label: '【值得深挖】' },
  tools:      { tag: '工具', cls: 'tag-tool',       label: '【工具/开源】' }
};

async function load() {
  const resp = await fetch('data/latest.json?t=' + Date.now());
  const data = await resp.json();

  // Header
  document.getElementById('temp').textContent    = data.temperature || '--';
  document.getElementById('signals').textContent = data.signalCount || '--';
  document.getElementById('sources').textContent = data.sourceCount || '--';
  document.getElementById('updateTime').textContent = (data.updateTimeStr || '--').slice(-5);

  // Build sections
  const sections = ['highlights', 'deepDive', 'tools'];
  let html = '';

  sections.forEach(section => {
    const items = (data.signals || []).filter(s => s.section === section);
    if (!items.length) return;

    const meta = SECTION_META[section];

    html += `
      <div class="section-head" style="margin-top:36px">
        <span class="dot"></span>
        <h2>${meta.label}</h2>
        <span class="line"></span>
      </div>`;

    items.forEach(s => {
      const icon  = SOURCE_ICONS[s.source] || SOURCE_ICONS['default'];
      const srcUrl = s.sourceUrl || '#';

      html += `
      <div class="signal-card">
        <div class="card-top">
          <div class="card-source-row">
            <a href="${srcUrl}" target="_blank" class="source-tag">${icon} ${s.source}</a>
            ${s.pubTime ? `<span class="time-badge">${s.pubTime}</span>` : ''}
          </div>
          <span class="section-tag ${meta.cls}">${meta.tag}</span>
        </div>
        <div class="card-title">${s.title}</div>
        ${s.summary ? `<div class="card-summary">${s.summary}</div>` : ''}
        <div class="card-footer">
          ${s.url && s.url !== '#' ? `<a href="${s.url}" target="_blank" class="card-link">🔗 查看原文 →</a>` : '<span></span>'}
        </div>
      </div>`;
    });
  });

  // Sources
  html += `
    <hr class="sep">
    <div class="section-head">
      <span class="dot" style="background:var(--accent2)"></span>
      <h2>情报来源</h2>
      <span class="line"></span>
    </div>
    <div class="sources-grid">`;

  const sourceMap = {};
  (data.signals || []).forEach(s => {
    if (!sourceMap[s.source]) {
      sourceMap[s.source] = { url: s.sourceUrl, count: 0 };
    }
    sourceMap[s.source].count++;
  });

  Object.entries(sourceMap).forEach(([name, info]) => {
    const icon = SOURCE_ICONS[name] || SOURCE_ICONS['default'];
    html += `
      <a href="${info.url || '#'}" target="_blank" class="source-chip">
        <span class="icon">${icon}</span>
        <div>
          <div class="name">${name}</div>
          <div class="type">${info.count} 条信号</div>
        </div>
      </a>`;
  });

  html += '</div>';

  document.getElementById('content').innerHTML = html;
}

load().catch(() => {
  document.getElementById('content').innerHTML =
    '<div class="loading" style="padding:60px;text-align:center;color:#64748b">数据加载失败，请刷新重试</div>';
});
</script>

</body>
</html>
