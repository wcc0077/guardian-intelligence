name: 👁️ Guardian Radar

on:
  schedule:
    # 每小时更新一次简报
    - cron: "0 * * * *"
  workflow_dispatch:   # 手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run Guardian Radar
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        run: |
          python3 scripts/guardian_briefing.py

      - name: Commit & Push
        run: |
          git config --local user.email "guardian@openclaw.ai"
          git config --local user.name "👁️ Guardian Bot"
          git add data/latest.json
          git diff --staged --quiet || git commit -m "📊 更新简报 $(date '+%Y-%m-%d %H:%M')"
          git push
